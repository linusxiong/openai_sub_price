<!DOCTYPE html>
<html lang="en" class="">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatGPT Price Comparison</title>
    <!-- HeroUI component styles — served as static file to bypass Vite CSS processing -->
    <link rel="stylesheet" href="/heroui.min.css" />
    <!-- Dark mode: apply before React loads to prevent FOUC -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("openai-price-preferences");
          var theme = "system";
          if (stored) {
            var parsed = JSON.parse(stored);
            theme = (parsed.state && parsed.state.theme) || "system";
          }
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (theme === "dark" || (theme === "system" && prefersDark)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
