    <meta charset="UTF-8" />

    <meta
      name="description"
      content="Compare ChatGPT subscription prices by country, plan, billing interval, currency, and tax treatment with a sortable global pricing table."

      name="keywords"
      content="ChatGPT price comparison, ChatGPT Plus price, ChatGPT Pro price, ChatGPT subscription, GPTSub, OpenAI pricing"
    />
    <meta name="robots" content="index, follow" />
    <meta name="application-name" content="GPTSub" />
    <meta name="author" content="Linus Xiong" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="canonical" href="https://gptsub.linusx.dev/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://gptsub.linusx.dev" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="GPTSub" />
    <meta property="og:url" content="https://gptsub.linusx.dev/" />
    <meta property="og:title" content="ChatGPT Subscription Price Comparison | GPTSub" />
    <meta
      property="og:description"
      content="Compare ChatGPT subscription prices across countries, plans, billing intervals, and display currencies."
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="ChatGPT Subscription Price Comparison | GPTSub" />
    <meta
      name="twitter:description"
      content="Compare ChatGPT subscription prices across countries, plans, billing intervals, and display currencies."
    />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "GPTSub",
        "url": "https://gptsub.linusx.dev/",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Any",
        "description": "Compare ChatGPT subscription prices by country, plan, billing interval, currency, and tax treatment.",
        "author": {
          "@type": "Person",
          "name": "Linus Xiong"
        },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
    <!-- Dark mode: apply before React loads to prevent FOUC -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("openai-price-preferences");
          var theme = "system";
          if (stored) {
            var parsed = JSON.parse(stored);
            theme = (parsed.state && parsed.state.theme) || "system";
          }
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (theme === "dark" || (theme === "system" && prefersDark)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
